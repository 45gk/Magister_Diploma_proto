<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>Заявка #{{ application.id }} (_new)</title></head>
<body>
<h1>Заявка #{{ application.id }} (_new)</h1>
<p>Дата: {{ application.app_date }}, клиент: {{ application.client_id }}</p>
<form method="post" action="{% url 'credit_new:applications-score' application_id=application.id %}">{% csrf_token %}
  <button type="submit">Скоринг</button>
</form>
<form method="post" action="{% url 'credit_new:applications-recommend' application_id=application.id %}">{% csrf_token %}
  <button type="submit">Объяснение агента</button>
</form>
<p><a href="{% url 'credit_new:applications-list' %}">Назад</a></p>
</body>
</html>
