{% extends "base.html" %}

{% block extra_css %}
<style>
    .edition-badge {
        display: inline-block;
        background: #764ba2;
        color: white;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        margin-left: 10px;
        vertical-align: middle;
        letter-spacing: 0.5px;
    }
    .subnav-card {
        background: #eef1ff;
        border: 1px solid #c5cff8;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 24px;
    }
    .subnav-card nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0;
    }
    .subnav-card nav a {
        background: white;
        color: #667eea;
        border: 1px solid #c5cff8;
        padding: 6px 14px;
        border-radius: 5px;
        font-size: 14px;
        text-decoration: none;
    }
    .subnav-card nav a:hover {
        background: #667eea;
        color: white;
    }
    input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 2px dashed #c5cff8;
        border-radius: 5px;
        background: #fafbff;
    }
    pre.preview-json {
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 12px;
        max-height: 320px;
    }
</style>
{% endblock %}

{% block content %}
<p style="margin: -10px 0 16px 0; color: #666; font-size: 14px;">
    Home Credit · staging / Data Vault
    <span class="edition-badge">NEW</span>
</p>

<div class="subnav-card">
    <nav>
        {% comment %} <a href="{% url 'index' %}">Главная</a>
        <a href="{% url 'applications-list' %}">Заявки</a>
        <a href="{% url 'applications-create' %}">Новая заявка</a>
        <a href="{% url 'csv-import' %}">Импорт CSV</a>
        <a href="{% url 'health' %}">Статус</a>
        <a href="/admin/" style="opacity: 0.75;">Админка</a> {% endcomment %}
    </nav>
</div>

{% block page_content %}{% endblock %}
{% endblock %}
